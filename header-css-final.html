<style>
/* === 티스토리 스타일 CSS === */

/* 기본 폰트 & 색상 */
body{font-family:'Noto Sans','Noto Sans KR','Montserrat',Arial,"Apple SD Gothic Neo","Malgun Gothic",Dotum,Helvetica,sans-serif;color:#333;-webkit-font-smoothing:antialiased;line-height:1.8}
a{color:#333;text-decoration:none}a:hover{text-decoration:underline}

/* 레이아웃 */
.wp-site-blocks{max-width:860px;margin:0 auto;padding:0 20px}
.wp-block-post-content,.entry-content{max-width:800px;margin:0 auto;font-size:16px;line-height:1.8}

/* 헤더 */
header{border-bottom:1px solid rgba(51,51,51,.1);padding:20px 0}

/* === 홈페이지 글 목록: 티스토리 스타일 === */

/* 글 목록을 1열로 */
.wp-block-post-template{display:block!important;columns:1!important}
.wp-block-post-template .wp-block-post{display:flex!important;flex-direction:row!important;align-items:flex-start;padding:24px 0;border-bottom:1px solid rgba(51,51,51,.1);margin-bottom:0!important;gap:20px}

/* 글 내용 (왼쪽) */
.wp-block-post-template .wp-block-post>*:not(.wp-block-post-featured-image){flex:1;min-width:0}

/* 썸네일 (오른쪽) */
.wp-block-post-template .wp-block-post .wp-block-post-featured-image{order:2!important;flex:0 0 160px!important;width:160px!important;height:120px!important;overflow:hidden;border-radius:4px}
.wp-block-post-template .wp-block-post .wp-block-post-featured-image img{width:160px!important;height:120px!important;object-fit:cover}

/* 글 제목 (목록) */
.wp-block-post-template .wp-block-post-title{font-size:18px!important;font-weight:700;line-height:1.4;margin:0 0 8px!important}
.wp-block-post-template .wp-block-post-title a{color:#333;text-decoration:none}
.wp-block-post-template .wp-block-post-title a:hover{text-decoration:underline}

/* 발췌문 */
.wp-block-post-template .wp-block-post-excerpt{margin:0!important}
.wp-block-post-template .wp-block-post-excerpt__excerpt{font-size:14px;color:rgba(51,51,51,.6);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* 날짜 */
.wp-block-post-template .wp-block-post-date{font-size:12px;color:rgba(51,51,51,.4);margin-top:8px}

/* === 개별 글 페이지 === */
.wp-block-post-title,.entry-title,h1.entry-title,h2.entry-title{font-size:28px!important;font-weight:700;line-height:1.4;color:#333;margin:7px 0 12px}
.wp-block-post-title a{text-decoration:none;color:#333}
.wp-block-post-date,.wp-block-post-terms,.entry-meta{font-size:13px;color:rgba(51,51,51,.5)}

/* 이미지 */
.entry-content figure,.wp-block-post-content figure{margin:0 0 20px;max-width:100%;clear:both}
.entry-content figure figcaption,.wp-block-post-content figure figcaption{font-size:13px;padding-top:10px;text-align:center;color:rgba(51,51,51,.5)}
.entry-content img,.wp-block-post-content img{max-width:100%;height:auto;cursor:zoom-in}
figure.imageblock.alignCenter{margin:0 auto 20px;text-align:center;display:table}

/* 라이트박스 */
.tistory-lb{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:999999;cursor:zoom-out;justify-content:center;align-items:center}
.tistory-lb.active{display:flex}
.tistory-lb img{max-width:95%;max-height:95vh;object-fit:contain;border-radius:4px;box-shadow:0 4px 20px rgba(0,0,0,.5);cursor:default}

/* 인용문 & 구분선 */
.entry-content blockquote{border:1px solid #ddd;background:#fcfcfc;padding:21px 25px;color:#666;line-height:1.75;margin:0 0 20px;font-style:normal}
.entry-content hr{border:none;border-top:1px solid rgba(51,51,51,.1);margin:30px 0}

/* 태그 */
.wp-block-post-terms.taxonomy-post_tag a,.tag-links a{display:inline-block;padding:5px 12px;border:1px solid rgba(51,51,51,.1);font-size:13px;color:rgba(51,51,51,.7);margin:0 8px 5px 0;border-radius:2px}
.wp-block-post-terms.taxonomy-post_tag a:hover{border-color:#333;color:#333;text-decoration:none}

/* 푸터 */
footer{border-top:1px solid rgba(51,51,51,.1);padding:20px 0;margin-top:60px;font-size:13px;color:rgba(51,51,51,.5);text-align:center}

/* 티스토리 호환 */
p[data-ke-size='size18']{font-size:1.12em}p[data-ke-size='size14']{font-size:.87em}p[data-ke-size='size16']{font-size:1em}

/* 반응형 */
@media(max-width:768px){
.wp-block-post-template .wp-block-post .wp-block-post-featured-image{flex:0 0 100px!important;width:100px!important;height:75px!important}
.wp-block-post-template .wp-block-post .wp-block-post-featured-image img{width:100px!important;height:75px!important}
.wp-block-post-title,.entry-title{font-size:22px!important}
.entry-content{font-size:15px}
}
</style>
